<?php
// ==========================================
// 1. KONEKSI DATABASE & INITIALIZATION
// ==========================================
$host     = "localhost";
$user_db  = "root";
$pass_db  = "";
$nama_db  = "db_rekam_medis";

$koneksi = mysqli_connect($host, $user_db, $pass_db, $nama_db);

if (!$koneksi) {
    die("Koneksi database gagal: " . mysqli_connect_error());
}

// Jalankan Session untuk Login & Fitur Ganti Warna
session_start();

// Default Username & Password untuk Login Admin
$username_valid = "admin";
$password_valid = "12345";

// Pengaturan Warna Latar Belakang (Default diatur ke warna HITAM #121212)
if (isset($_POST['ganti_warna'])) {
    $_SESSION['bg_color'] = $_POST['warna'];
}
$bg_color = isset($_SESSION['bg_color']) ? $_SESSION['bg_color'] : '#121212';

// Tentukan warna teks otomatis berdasarkan latar belakang agar tetap terbaca
$text_color = ($bg_color == '#121212' || $bg_color == '#000000') ? '#ffffff' : '#333333';
$card_bg    = ($bg_color == '#121212' || $bg_color == '#000000') ? '#1e1e1e' : '#ffffff';
?>

<?php
// ==========================================
// 2. PROSES LOGIN & LOGOUT
// ==========================================
$error_login = "";
if (isset($_POST['login'])) {
    $username = $_POST['username'];
    $password = $_POST['password'];

    if ($username === $username_valid && $password === $password_valid) {
        $_SESSION['login_user'] = $username;
    } else {
        $error_login = "Username atau Password salah!";
    }
}

if (isset($_GET['logout'])) {
    session_destroy();
    header("Location: index.php");
    exit();
}

// ==========================================
// 3. PROSES HAPUS DATA PASIEN
// ==========================================
if (isset($_GET['hapus']) && isset($_SESSION['login_user'])) {
    $id = $_GET['hapus'];
    mysqli_query($koneksi, "DELETE FROM pasien WHERE id_pasien = $id");
    header("Location: index.php");
    exit();
}

// ==========================================
// 4. PROSES UPDATE DATA PASIEN
// ==========================================
if (isset($_POST['update']) && isset($_SESSION['login_user'])) {
    $id = $_POST['id_pasien'];
    $nama = $_POST['nama_pasien'];
    $tgl_lahir = $_POST['tanggal_lahir'];
    $jk = $_POST['jenis_kelamin'];
    $alamat = $_POST['alamat'];

    mysqli_query($koneksi, "UPDATE pasien SET nama_pasien='$nama', tanggal_lahir='$tgl_lahir', jenis_kelamin='$jk', alamat='$alamat' WHERE id_pasien=$id");
    header("Location: index.php");
    exit();
}

// Ambil data untuk form edit jika tombol edit ditekan
$edit_data = null;
if (isset($_GET['edit']) && isset($_SESSION['login_user'])) {
    $id_edit = $_GET['edit'];
    $result_edit = mysqli_query($koneksi, "SELECT * FROM pasien WHERE id_pasien = $id_edit");
    $edit_data = mysqli_fetch_assoc($result_edit);
}
?>
